<style>
  /* Critical CSS */
  html, body {
    height: 100%; margin: 0; padding: 0;
    font-family: 'Sarabun', system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
  }
  
  /* THEME "Lavender Dusk & Electric Coral" */
  :root {
    --color-primary: 255 111 97;   /* Electric Coral */
    --color-text-main: #2E2E2E;
    --color-text-muted: #5a5a6a;
    --color-card: rgba(255, 255, 255, 0.75);
    --color-border: #E6E0FF;
    --grad-1: #FF6F61;
    --grad-2: #D667C3;
    --color-highlight: #FFEB3B;
  }
  :root[data-theme="dark"] {
    --color-text-main: #F7F5FF;
    --color-text-muted: #a8a0b5;
    --color-card: rgba(46, 36, 58, 0.7);
    --color-border: #3A3042;
    --grad-1: #FF8578;
    --grad-2: #E087D0;
  }

  /* ANIMATED "LIVING" BACKGROUND */
  @keyframes animated-aurora {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  body {
    color: var(--color-text-main);
    -webkit-font-smoothing: antialiased;
    background: linear-gradient(-45deg, #E6E0FF, #D667C3, #FF6F61, #3A3042);
    background-size: 400% 400%;
    animation: animated-aurora 20s ease infinite;
  }
  :root[data-theme="dark"] body {
    background: linear-gradient(-45deg, #1A1423, #3A3042, #E087D0, #FF8578);
    background-size: 400% 400%;
    animation: animated-aurora 20s ease infinite;
  }
  
  /* Kissmodel Logo & Title Animation */
  .kissmodel-logo {
    font-size: 1.8rem; font-weight: 700; display: inline-block; color: #fff;
    text-shadow: 0 0 5px var(--grad-1), 0 0 10px var(--grad-1), 0 0 20px var(--grad-2);
    animation: flicker 2s infinite alternate;
  }
  .kissmodel-logo .star {
    font-size: 1.2em; display: inline-block; color: var(--color-highlight);
    animation: star-glow 2s infinite ease-in-out;
    text-shadow: 0 0 10px var(--color-highlight), 0 0 20px #fff;
  }
  .dashboard-title {
    font-size: 2.5rem; font-weight: 800;
    background: linear-gradient(90deg, var(--grad-1), var(--grad-2), var(--color-highlight), var(--grad-1));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: gradient-flow 5s ease infinite;
    background-size: 300% 300%;
  }
  @keyframes flicker { 0%, 100% { text-shadow: 0 0 5px var(--grad-1), 0 0 10px var(--grad-1); } 50% { text-shadow: 0 0 8px var(--grad-1), 0 0 25px var(--grad-2); } }
  @keyframes star-glow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3) rotate(15deg); } }
  @keyframes gradient-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  /* Buttons with Shine Effect */
  .btn-pro, .btn-primary {
    position: relative; overflow: hidden; border-radius: 9999px;
    padding: .7rem 1.2rem; font-weight: 600; color: #fff !important;
    background: linear-gradient(90deg, var(--grad-1), var(--grad-2));
    box-shadow: 0 10px 24px rgba(var(--color-primary), 0.35);
    transition: transform .15s ease, filter .2s ease;
    border: none;
  }
  .btn-pro:hover, .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-pro::before, .btn-primary::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left 0.5s ease; transform: skewX(-25deg);
  }
  .btn-pro:hover::before, .btn-primary:hover::before { left: 150%; }

  /* General UI Styles */
  .card-surface {
    background-color: var(--color-card);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 1.25rem;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.18);
  }
  /* FIXED: Form input readability */
  .form-input {
    width: 100%; padding: 0.6rem 1rem; border: 1px solid var(--color-border);
    border-radius: 0.5rem; transition: all 0.2s ease;
    background-color: rgba(255, 255, 255, 0.6); /* More opaque */
    color: var(--color-text-main);
  }

  :root[data-theme="dark"] .form-input { background-color: rgba(0, 0, 0, 0.3); }
  .form-input:focus {
    outline: none; border-color: rgb(var(--color-primary));
    box-shadow: 0 0 0 3px rgba(var(--color-primary), 0.2);
  }
  #sidebar, #header { background-color: transparent !important; }
  .nav-button:hover { background-color: rgba(var(--color-primary), 0.1); }
  .nav-button.active {
    background-color: rgba(var(--color-primary), 0.15);
    color: rgb(var(--color-primary)); font-weight: 600;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .loader-lg {
    width: 60px; height: 60px; border: 5px solid var(--color-border);
    border-top-color: rgb(var(--color-primary));
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  
</style>

<style>
/* สไตล์ปุ่มลอย (Admin Widget) */
#admin-widget-root {
    position: fixed; z-index: 99999; bottom: 30px; right: 30px;
    display: flex; flex-direction: column-reverse; align-items: end; gap: 10px;
}

/* ตัวปุ่มลอย (Assistive Button) */
.float-btn {
    width: 60px; height: 60px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: #333; font-size: 24px;
    user-select: none; touch-action: none;
}
.float-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.8); }
.float-btn:active { transform: scale(0.95); }

/* หน้าต่างเครื่องเล่น (Popup Panel) */
.widget-panel {
    width: 350px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform-origin: bottom right;
    transition: all 0.3s ease;
    opacity: 0; transform: scale(0.8) translateY(20px); pointer-events: none;
    position: absolute; bottom: 80px; right: 0;
}
.widget-panel.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

/* Input สวยๆ */
.glass-input {
    background: rgba(255,255,255,0.5); border: 1px solid #ccc;
    border-radius: 8px; padding: 8px 12px; width: 100%;
    font-size: 13px; outline: none; margin-bottom: 10px;
}
/* กรอบรวม */
.music-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 350px; /* ขนาดพอดีมือถือ */
  margin: 0 auto;
}

/* คอนเทนเนอร์รูปปก (แทนที่จอดำ) */
.cover-image-container {
  position: relative;
  width: 100%;
  height: 200px; /* ความสูงตามต้องการ */
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.cover-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s;
}

/* เอฟเฟกต์ภาพขยายตอนเล่น */
.cover-img.spinning {
  transform: scale(1.1);
}

/* จัดปุ่มให้อยู่ตรงกลางรูป */
.center-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.2); /* ฟิล์มดำบางๆ */
}

/* --- ปุ่ม Play แบบ Neon Glass --- */
.neon-play-btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15); /* ใสแบบกระจก */
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: all 0.3s ease;
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}

.neon-play-btn:hover {
  transform: scale(1.1);
  background: rgba(255, 255, 255, 0.25);
}

/* ตอนกดเล่นแล้ว ให้ปุ่มเรืองแสงสีม่วง/ชมพู */
.neon-play-btn.playing {
  box-shadow: 
    0 0 20px #d946ef, 
    0 0 40px #8b5cf6, 
    inset 0 0 10px rgba(255, 255, 255, 0.5);
  border-color: #f0abfc;
}


</style>

async function uploadToCloudinary(file) {
    const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);
    formData.append("folder", "images"); // เก็บลงโฟลเดอร์ images ตามที่คุณต้องการ

    try {
        const response = await fetch(url, { method: "POST", body: formData });
        const data = await response.json();
        if (data.secure_url) return data.secure_url; 
        throw new Error(data.error?.message || "Upload failed");
    } catch (err) {
        console.error("Cloudinary Error:", err);
        return null;
    }
}

// Application State

  allProfiles: [],

// UI Utilities
const UI = {
  debounce: (func, delay) => {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), delay);
    };
  },
  
  showToast(message, type = 'success', duration = 3000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const icon = {
      success: 'fa-check-circle',
      error: 'fa-exclamation-triangle',
      info: 'fa-info-circle'
    }[type];
    
    const bgColor = {
      success: 'bg-green-500',
      error: 'bg-red-600',
      info: 'bg-blue-500'
    }[type];
    
    toast.className = `flex items-center gap-3 p-4 rounded-lg text-white shadow-lg transform transition-all duration-300 translate-x-full ${bgColor}`;
    toast.innerHTML = `<i class="fas ${icon} text-xl"></i><span>${message}</span>`;
    container.appendChild(toast);
    
    requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
    
    setTimeout(() => {
      toast.classList.add('translate-x-full');
      toast.addEventListener('transitionend', () => toast.remove());
    }, duration);
  },
  
  showModal(config) {
    const {
      title,
      message,
      confirmText = 'ยืนยัน',
      cancelText = 'ยกเลิก',
      onConfirm,
      isDestructive = true
    } = config;
    
    const modalRoot = document.getElementById('modal-root');
    const modalId = `modal-${Date.now()}`;
    const confirmBtnClass = isDestructive ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700';
    
    modalRoot.innerHTML = `
      <div id="${modalId}" class="fixed inset-0 z-[10002] flex items-center justify-center p-4">
        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm modal-backdrop"></div>
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 relative modal-box">
          <h3 class="text-xl font-bold text-gray-900">${title}</h3>
          <div class="mt-2 text-sm text-gray-600">${message}</div>
          <div class="mt-6 flex justify-end space-x-3">
            <button class="modal-cancel-btn px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">
              ${cancelText}
            </button>
            <button class="modal-confirm-btn px-4 py-2 text-sm font-medium text-white ${confirmBtnClass} rounded-lg">
              ${confirmText}
            </button>
          </div>
        </div>
      </div>
    `;
    
    const modalEl = document.getElementById(modalId);
    const closeModal = () => modalEl.remove();
    
    modalEl.querySelector('.modal-confirm-btn').onclick = () => {
      onConfirm();
      closeModal();
    };
    
    modalEl.querySelector('.modal-cancel-btn').onclick = closeModal;
    modalEl.querySelector('.modal-backdrop').onclick = closeModal;
  },
  
  showProfileLightbox(profile) {
    const modalRoot = document.getElementById('modal-root');
    const placeholder = 'https://placehold.co/800x1000/f3f4f6/9ca3af?text=No+Image';
    const imageUrl = (profile.imagePath && profile.imagePath.startsWith('http')) 
  ? profile.imagePath 
  : placeholder;
    
    const provinceName = AppState.provinces.find(p => p.key === profile.provinceKey)?.nameThai || 'N/A';
    const modalId = `lightbox-${profile.id}`;
    
    const detailItem = (icon, label, value) => {
      return value ? `
        <div class="flex items-start">
          <i class="fas fa-${icon} w-5 text-center text-indigo-500 mt-1"></i>
          <div class="ml-3">
            <p class="font-semibold text-slate-800">${label}</p>
            <p class="text-slate-600">${value}</p>
          </div>
        </div>
      ` : '';
    };
    
    const availabilityClass = {
      'รับงาน': 'bg-green-100 text-green-800',
      'ว่าง': 'bg-green-100 text-green-800',
      'สอบถามคิว': 'bg-blue-100 text-blue-800',
      'ไม่ว่าง': 'bg-red-100 text-red-800',
      'พัก': 'bg-gray-100 text-gray-800'
    }[profile.availability] || 'bg-yellow-100 text-yellow-800';
    
    modalRoot.innerHTML = `
      <div id="${modalId}" class="fixed inset-0 z-[10002] flex items-center justify-center p-4">

  toggleButtonLoading(button, isLoading, defaultText = 'Submit') {

      ? `<span class="loader-sm w-5 h-5 inline-block"></span>`

  setActiveNav(viewId) {

      const isActive = b.dataset.view === viewId;

      b.classList.toggle('text-indigo-700', isActive);
      b.classList.toggle('text-slate-600', !isActive);

  },
};

// Main Application Controller
const Controller = {
  async initApp() {
    DOM.globalLoader.classList.remove('hidden');

    const { data: { session }, error } = await supabase.auth.getSession();

      console.error("Error fetching session:", error);
      this.showLoginScreen("เกิดข้อผิดพลาดในการเชื่อมต่อ");
      return;
    }
    
    if (session) {
      AppState.currentUser = session.user;
      await this.startAdminPanel();
    } else {
      this.showLoginScreen();
    }
    
    // Listen for auth state changes
    supabase.auth.onAuthStateChange((_event, session) => {
      if (session && !AppState.currentUser) {
        AppState.currentUser = session.user;
        this.startAdminPanel();
      } else if (!session && AppState.currentUser) {

        this.showLoginScreen("ออกจากระบบสำเร็จ");

    await this.fetchData();

  },
async fetchData(force = false) {
    // 1. ดึงข้อมูลโปรไฟล์ (ใช้แบบ Fetch ทั้งหมดไปเลยถ้า data ไม่เยอะ เพื่อป้องกันความซ้ำซ้อนของ Timestamp)
    const { data: profiles, error: pErr } = await supabase
        .from('profiles')
        .select('*');
    
    if (pErr) throw pErr;
    
    // เก็บเข้า AppState แบบล้างค่าเก่าทิ้งเลย (ชัวร์ที่สุด)
    AppState.allProfiles = profiles || [];
    AppState.lastFetchTime = new Date().toISOString();
    
    // 2. ดึงข้อมูลจังหวัดและทำ Unique ทันที
    if (force || AppState.provinces.length === 0) {
        const { data: provinces, error: provErr } = await supabase
            .from('provinces')
            .select('*')
            .order('nameThai');
        
        if (provErr) throw provErr;

        // ป้องกันจังหวัดซ้ำด้วยการใช้ Map กรองตาม Key (ตัวกันตาย)
        const uniqueMap = new Map();
        provinces.forEach(item => {
            if (!uniqueMap.has(item.key)) {
                uniqueMap.set(item.key, item);
            }
        });
        AppState.provinces = Array.from(uniqueMap.values());
    }
    
    this.updateStats();
},
  
  updateStats() {
    AppState.stats.profiles = AppState.allProfiles.length;
    AppState.stats.featured = AppState.allProfiles.filter(p => p.isfeatured).length;
    AppState.stats.provinces = AppState.provinces.length;
  },

  calculateDashboardStats() {
    const profiles = AppState.allProfiles;
    const stats = {
        uploadsLast7Days: { labels: [], values: Array(7).fill(0) },
        profilesByProvince: {},
    };
    const today = new Date();
    today.setHours(23, 59, 59, 999);

    // คำนวณโปรไฟล์ที่อัปเดตใน 7 วันล่าสุด
    for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        stats.uploadsLast7Days.labels.push(d.toLocaleDateString('th-TH', { weekday: 'short' }));

        const startOfDay = new Date(d);
        startOfDay.setHours(0, 0, 0, 0);

        profiles.forEach(p => {
            if (p.lastUpdated) {
                const updatedDate = new Date(p.lastUpdated);
                if (updatedDate >= startOfDay && updatedDate <= d) {
                    stats.uploadsLast7Days.values[i]++;
                }
            }
        });
    }
    stats.uploadsLast7Days.labels.reverse();
    stats.uploadsLast7Days.values.reverse();

    // คำนวณสัดส่วนโปรไฟล์ในแต่ละจังหวัด
    AppState.provinces.forEach(prov => {
        const count = profiles.filter(p => p.provinceKey === prov.key).length;
        if (count > 0) {
            stats.profilesByProvince[prov.nameThai] = count;
        }
    });

    return stats;
  },

renderGroupedProfileCards() {
    const listEl = document.getElementById('profiles-grouped-list');
    if (!listEl) return;

    // 1. ดึงค่าจาก Filter UI (ตรวจสอบ ID ให้ตรงกับ HTML ของคุณ)
    const searchTerm = document.getElementById('search-input')?.value.toLowerCase().trim() || '';
    const selectedProvince = document.getElementById('filter-province')?.value || '';
    const isFeaturedOnly = document.getElementById('filter-featured')?.checked || false;

    // 2. กรองข้อมูลโปรไฟล์ตามเงื่อนไขทั้งหมด
    let filteredProfiles = AppState.allProfiles.filter(p => {
        const matchesSearch = !searchTerm || 
            (p.name && p.name.toLowerCase().includes(searchTerm)) || 
            (p.lineId && p.lineId.toLowerCase().includes(searchTerm));
        
        const matchesProvince = !selectedProvince || p.provinceKey === selectedProvince;
        
        const matchesFeatured = !isFeaturedOnly || p.isfeatured;

        return matchesSearch && matchesProvince && matchesFeatured;
    });

    // 3. สร้าง HTML แยกตามกลุ่มจังหวัด
    let html = AppState.provinces.map(province => {
        const profilesInProvince = filteredProfiles.filter(p => p.provinceKey === province.key);
        
        // ถ้าจังหวัดนี้ไม่มีโปรไฟล์ที่ตรงเงื่อนไข ไม่ต้องแสดงหัวข้อ
        if (profilesInProvince.length === 0) return '';
        
        return `
            <div class="province-group mb-10 animate-fade-in">
                <h2 class="text-2xl font-bold text-slate-800 border-b-2 border-indigo-200 pb-2 mb-4 flex items-center gap-2">
                    <i class="fas fa-map-marker-alt text-indigo-500"></i>
                    ${province.nameThai}
                    <span class="text-sm font-normal text-slate-400">(${profilesInProvince.length} โปรไฟล์)</span>
                </h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                    ${profilesInProvince.map(p => this.getProfileCardHTML(p)).join('')}
                </div>
            </div>
        `;
    }).join('');
    
    // 4. แสดงผลลงหน้าจอ
    listEl.innerHTML = html || `
        <div class="text-center py-20 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
            <i class="fas fa-search text-4xl text-slate-300 mb-3"></i>
            <p class="text-slate-500 font-medium">ไม่พบโปรไฟล์ที่ตรงตามเงื่อนไข</p>
        </div>
    `;

    // 5. ผูก Event Listeners ให้กับปุ่มที่สร้างขึ้นใหม่ (ต้องอยู่ในฟังก์ชันนี้)
    
    // ปุ่มแก้ไข (Edit)
    listEl.querySelectorAll('.edit-profile-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            this.renderView('profile-form-container', { profileId: id });
        };
    });

    // ปุ่มลบ (Delete)
    listEl.querySelectorAll('.delete-profile-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const { id, name } = btn.dataset;
            this.handleDeleteProfile({ id, name });
        };
    });

    // คลิกที่ตัว Card เพื่อดู Lightbox (อ้างอิงตาม UI.showProfileLightbox)
    listEl.querySelectorAll('.profile-card-clickable').forEach(card => {
        card.onclick = () => {
            const id = card.dataset.id;
            const profile = AppState.allProfiles.find(p => String(p.id) === String(id));
            if (profile && typeof UI.showProfileLightbox === 'function') {
                UI.showProfileLightbox(profile);
            }
        };
    });
},

getProfileCardHTML(p) {
    let imgUrl = 'https://placehold.co/400x500?text=No+Image';

    // Logic การเลือกรูปภาพแบบ Dev ขั้นสูงสุด (Cloudinary > Supabase Storage > Gallery)
    if (p.imagePath && p.imagePath.startsWith('http')) {
        imgUrl = p.imagePath;
    } 
    else if (p.imagePath && p.imagePath !== '') {
        imgUrl = supabase.storage.from('profiles').getPublicUrl(p.imagePath).data.publicUrl;
    } 
    else if (p.galleryPaths && p.galleryPaths.length > 0) {
        imgUrl = p.galleryPaths[0];
    }

    const provName = AppState.provinces.find(prov => prov.key === p.provinceKey)?.nameThai || p.provinceKey || '-';

    return `
      <div class="card-surface overflow-hidden group relative flex flex-col h-full profile-card-clickable cursor-pointer bg-white rounded-xl shadow-sm hover:shadow-md transition-all border border-slate-100" data-id="${p.id}">
        <div class="relative aspect-[3/4] overflow-hidden">
            <img src="${imgUrl}" 
                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"

// =========================================================================
// KISSMODEL ADMIN CONTROLLER - FULL VERSION (NO SHORTENED)
// =========================================================================

  initImageUploader(imageUrl) {
    const uploaderEl = document.getElementById('image-uploader');
    if (!uploaderEl) return;

    uploaderEl.innerHTML = `
      <div class="space-y-3">
        <div id="dz" class="relative w-full min-h-[12rem] rounded-xl p-6 border-2 border-dashed border-slate-300 bg-slate-50
                            hover:border-indigo-400 transition cursor-pointer group">
          <input type="file" id="image-file-input" accept="image/*" multiple
                 class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
          <div class="pointer-events-none text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-50 text-indigo-500 mb-3 group-hover:scale-110 transition">
              <i class="fas fa-cloud-upload-alt text-xl"></i>
            </div>
            <p class="text-sm text-slate-600 font-bold">ลากและวางรูปภาพที่นี่ หรือกดเพื่อเลือกหลายรูป</p>
            <p class="text-xs text-slate-400 mt-1">ไฟล์จะถูกส่งไปที่ Cloudinary (รองรับ .webp, .jpg, .png)</p>
          </div>
        </div>
        <div id="multi-preview" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
      </div>
    `;
    
    const fileInput = document.getElementById('image-file-input');
    const dz = document.getElementById('dz');
    const previewGrid = document.getElementById('multi-preview');
    
    const renderPreview = (files) => {
      previewGrid.innerHTML = '';
      files.forEach(f => {
        const url = URL.createObjectURL(f);
        const card = document.createElement('div');
        card.className = 'relative rounded-xl overflow-hidden shadow-md bg-white border border-slate-200 subtle-pop';
        card.innerHTML = `
          <img src="${url}" class="w-full h-40 object-cover" alt="">
          <div class="absolute bottom-0 inset-x-0 bg-black/60 text-white text-[10px] p-2 truncate backdrop-blur-sm">
            ${f.name}
          </div>
        `;
        previewGrid.appendChild(card);
      });
    };
    
    dz.addEventListener('dragover', e => { 
      e.preventDefault(); 
      dz.classList.add('border-indigo-400', 'bg-indigo-50'); 
    });
    
    dz.addEventListener('dragleave', () => { 
      dz.classList.remove('border-indigo-400', 'bg-indigo-50'); 
    });
    
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('border-indigo-400', 'bg-indigo-50');
      const dtFiles = Array.from(e.dataTransfer.files || []).filter(f => /^image\//.test(f.type));
      if (!dtFiles.length) return;
      
      const dataTransfer = new DataTransfer();
      dtFiles.forEach(f => dataTransfer.items.add(f));
      fileInput.files = dataTransfer.files;
      renderPreview(dtFiles);
    });
    
    fileInput.addEventListener('change', e => {
      renderPreview(Array.from(e.target.files || []));
    });
    
    if (imageUrl) {
      previewGrid.innerHTML = `
        <div class="relative rounded-xl overflow-hidden shadow-lg border-2 border-indigo-500 bg-white">
          <img src="${imageUrl}" class="w-full h-40 object-cover" alt="">
          <div class="absolute top-2 left-2 bg-indigo-600 text-white text-[10px] px-2 py-1 rounded-full font-bold shadow-sm">รูปปัจจุบัน</div>
        </div>
      `;
    }
  },

  initTagInput(initialTags = []) {
    const container = document.getElementById('tag-input-component');
    if (!container) return;
    let tags = Array.isArray(initialTags) ? [...initialTags] : [];
    
    const suggestedTags = ['น่ารัก', 'เอาใจเก่ง', 'สายฝอ', 'ตัวเล็ก', 'ผิวขาว', 'อวบ', 'คุยสนุก', 'ฟิลแฟน', 'ไม่เร่งรีบ'];

    const render = () => {
      container.innerHTML = `
        <div class="tag-input-container bg-white border border-slate-300 rounded-xl p-2.5 flex flex-wrap gap-2 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-100 transition shadow-sm">
          ${tags.map(tag => `
            <div class="tag-item bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-2 border border-indigo-100 animate-fade-in">
              <span>${tag}</span>
              <i class="fas fa-times tag-remove-btn cursor-pointer hover:text-red-500 transition" data-tag="${tag}"></i>
            </div>
          `).join('')}
          <input type="text" class="tag-input flex-1 min-w-[150px] outline-none text-sm bg-transparent" placeholder="เพิ่มสไตล์แล้วกด Enter...">
        </div>
        <div class="mt-3 flex flex-wrap gap-2 items-center">
          <span class="text-[11px] text-slate-400 font-medium">แนะนำ:</span>
          ${suggestedTags.map(tag => 
            !tags.includes(tag) ? `<button type="button" class="suggest-tag-btn text-[11px] bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full hover:bg-indigo-600 hover:text-white transition-all transform hover:scale-105 shadow-sm">${tag}</button>` : ''
          ).join('')}
        </div>
      `;
      
      const inputEl = container.querySelector('.tag-input');
      inputEl?.addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.value.trim()) {
          e.preventDefault();
          const newTags = e.target.value.trim().split(',').map(t => t.trim()).filter(Boolean);
          tags = [...new Set([...tags, ...newTags])];
          render();
        }
      });
      
      container.querySelectorAll('.tag-remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          tags = tags.filter(t => t !== btn.dataset.tag);
          render();
        });
      });

      container.querySelectorAll('.suggest-tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          tags = [...new Set([...tags, btn.textContent])];
          render();
        });
      });
    };
    render();
  },
  
  async handleProfileFormSubmit(e) {
    e.preventDefault();
    const form = e.target;
    // 1. ดึง ID มาเช็คให้ชัวร์
    const profileId = form.querySelector('#profile-id').value;
    const isEditing = !!profileId && profileId !== ""; 
    const saveButton = form.querySelector('#save-profile-button');
    
    UI.toggleButtonLoading(saveButton, true, isEditing ? 'กำลังอัปเดตข้อมูล...' : 'กำลังสร้างโปรไฟล์...');
    
    try {
        const fileInput = form.querySelector('#image-file-input');
        // ดึง Path รูปปัจจุบันจาก Hidden Input
        let currentImagePath = form.querySelector('#current-image-path').value || '';
        let uploadedUrls = [];
        const files = Array.from(fileInput?.files || []);
        
        // --- 1. Cloudinary Multi-Upload Logic ---
        if (files.length) {
            UI.showToast(`กำลังอัปโหลด ${files.length} รูป...`, 'info');
            for (const [index, f] of files.entries()) {
                const formData = new FormData();
                formData.append('file', f);
                formData.append('upload_preset', UPLOAD_PRESET);
                formData.append('folder', 'images');

                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                if (data.secure_url) {
                    uploadedUrls.push(data.secure_url);
                } else {
                    throw new Error(`Cloudinary Error: ${data.error?.message || "Upload Failed"}`);
                }
            }
        }

        // --- 2. Prepare Data for Supabase ---
        const profileData = this.collectFormData(form);

        // Logic การเลือกรูป: ถ้ามีรูปใหม่ใช้รูปใหม่ ถ้าไม่มีให้ใช้รูปเดิม
        if (uploadedUrls.length > 0) {
            profileData.imagePath = uploadedUrls[0];
            profileData.galleryPaths = uploadedUrls;
        } else {
            profileData.imagePath = currentImagePath;
            // ไม่ต้องใส่ galleryPaths เพื่อให้ Supabase ใช้ค่าเดิมที่มีอยู่แล้วใน DB
        }

        if (!profileData.imagePath && !isEditing) {
            throw new Error('กรุณาเลือกรูปภาพอย่างน้อย 1 รูปสำหรับโปรไฟล์ใหม่');
        }

        // --- 3. Supabase Integration ---
        let result;
        if (isEditing) {
            // มิติ Dev: การ Update ต้องลบ ID ออกจาก Object ข้อมูลก่อนเสมอ
            const { id, ...updateData } = profileData; 

            result = await supabase
                .from('profiles')
                .update(updateData)
                .eq('id', profileId)
                .select()
                .single();
        } else {
            result = await supabase
                .from('profiles')
                .insert([profileData])
                .select()
                .single();
        }
        
        if (result.error) throw result.error;
        
        UI.showToast(isEditing ? 'อัปเดตเรียบร้อย' : 'สร้างสำเร็จ', 'success');
        await this.fetchData();
        this.renderView('profiles-list-container');
        
    } catch (err) {
        console.error("Critical Save Error:", err);
        UI.showToast(err.message, 'error');
    } finally {
        UI.toggleButtonLoading(saveButton, false, isEditing ? 'บันทึก' : 'สร้าง');
    }
  },
  handleEditProfile(id) {
    // 1. ค้นหาข้อมูลโปรไฟล์จาก State ด้วย ID
    const p = AppState.profiles.find(item => item.id == id);
    if (!p) {
      UI.showToast('ไม่พบข้อมูลโปรไฟล์ที่ต้องการแก้ไข', 'error');
      return;
    }

    // 2. เปลี่ยนหน้าไปที่ Form Container (ตรวจสอบชื่อ ID ของ Container คุณด้วย)
    this.renderView('profile-form-container'); 

    // 3. เข้าถึง Form
    const form = document.getElementById('profile-form');
    if (!form) return;

    // --- ส่วนที่สำคัญที่สุด: ยัดค่าใส่ Input แต่ละตัว ---
    
    // Hidden Fields (ห้ามลืมเด็ดขาด!)
    form.querySelector('#profile-id').value = p.id;
    form.querySelector('#current-image-path').value = p.imagePath || '';

    // Basic Info
    form.querySelector('#name').value = p.name || '';
    form.querySelector('#age').value = p.age || '';
    form.querySelector('#height').value = p.height || '';
    form.querySelector('#weight').value = p.weight || '';
    form.querySelector('#stats').value = p.stats || '';
    form.querySelector('#skinTone').value = p.skinTone || '';
    form.querySelector('#provinceKey').value = p.provinceKey || '';
    form.querySelector('#location').value = p.location || '';
    form.querySelector('#rate').value = p.rate || '';
    form.querySelector('#availability').value = p.availability || 'สอบถามคิว';
    form.querySelector('#lineId').value = p.lineId || '';
    form.querySelector('#quote').value = p.quote || '';
    form.querySelector('#description').value = p.description || '';
    form.querySelector('#altText').value = p.altText || '';
    form.querySelector('#isFeatured').checked = !!p.isfeatured;

    // SEO Data
    form.querySelector('#seo-title').value = p.seo_title || '';
    form.querySelector('#meta-description').value = p.meta_description || '';
    form.querySelector('#slug').value = p.slug || '';

    // --- การจัดการ Style Tags (ถ้ามีระบบ Tag) ---
    const tagContainer = form.querySelector('#tags-container'); // ปรับตาม ID จริงของคุณ
    if (tagContainer) {
      tagContainer.innerHTML = ''; // ล้าง Tag เก่า
      if (p.styleTags && Array.isArray(p.styleTags)) {
        p.styleTags.forEach(tag => {
          // สร้าง Tag Element (เรียกใช้ฟังก์ชันสร้าง Tag ของคุณ ถ้ามี)
          this.addTagToUI(tag, tagContainer); 
        });
      }
    }

    // --- แสดง Preview รูปปัจจุบัน ---
    const previewImg = document.getElementById('image-preview'); // ถ้ามี <img> สำหรับพรีวิว
    if (previewImg) {
      previewImg.src = p.imagePath || 'https://placehold.co/400x500?text=No+Image';
    }

    // 4. เปลี่ยนชื่อปุ่มบันทึกให้ชัดเจน
    const saveButton = form.querySelector('#save-profile-button');
    if (saveButton) saveButton.textContent = 'อัปเดตข้อมูล (Update Profile)';

    UI.showToast(`กำลังแก้ไขข้อมูลของ: ${p.name}`, 'info');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },
collectFormData(form) {
    if (!form) return {};

    // Helper: ดึงค่าจากฟอร์มปัจจุบันเท่านั้น
    const fv = (id) => form.querySelector(`#${id}`)?.value?.trim() || '';

// Rehydrate multi-preview from existing imagePaths
(function(){

  if (!preview) return;
  const form = document.getElementById('profile-form') || document.querySelector('form');
  if (!form) return;

// Auto-close sidebar on navigation (mobile)
(function(){
  const mq = window.matchMedia('(max-width: 1024px)');
  const closeSidebar = () => {

      if (mq.matches) closeSidebar();
      return res;
    };
  }
})();

// Advanced Multi-Preview: drag & drop, remove items, limit, de-dup
(function(){
  const input = document.getElementById('image-file-input');
  const preview = document.getElementById('multi-preview');
  if (!input || !preview) return;
  
  const dropArea = input.closest('.relative') || preview.parentElement;
  const MAX_FILES = 20;
  const MAX_SIZE = 10 * 1024 * 1024; // 10MB
  
  const dedup = (files) => {
    const seen = new Set();
    const out = [];
    for (const f of files) {
      const key = `${f.name}|${f.size}|${f.lastModified}`;
      if (!seen.has(key)) {
        seen.add(key);
        out.push(f);
      }
    }
    return out;
  };
  
  const rebuildInputFiles = (files) => {
    const dt = new DataTransfer();
    files.forEach(f => dt.items.add(f));
    input.files = dt.files;
  };
  
  const render = () => {
    preview.innerHTML = '';
    const files = Array.from(input.files || []);
    
    files.forEach((file, idx) => {
      const url = URL.createObjectURL(file);
      const card = document.createElement('div');
      card.className = 'group relative rounded-xl overflow-hidden shadow hover:shadow-lg transition transform hover:scale-[1.01] subtle-pop';
      
      const img = document.createElement('img');
      img.src = url;
      img.alt = file.name;
      img.className = 'w-full h-32 object-cover';
      
      const topbar = document.createElement('div');
      topbar.className = 'absolute inset-x-0 top-0 flex justify-between p-2 opacity-0 group-hover:opacity-100 transition';
      
      const badge = document.createElement('div');
      badge.className = 'text-[10px] px-2 py-1 rounded-full bg-black/60 text-white backdrop-blur';
      badge.textContent = (file.type || '').replace('image/','').toUpperCase();
      
      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'text-white bg-red-500/80 hover:bg-red-600 text-xs px-2 py-1 rounded';
      del.textContent = 'ลบ';
      del.addEventListener('click', () => {
        const arr = Array.from(input.files);
        arr.splice(idx, 1);
        rebuildInputFiles(arr);
        render();
      });
      
      topbar.appendChild(badge);
      topbar.appendChild(del);
      card.appendChild(img);
      card.appendChild(topbar);
      preview.appendChild(card);
    });
  };
  
  const accept = (files) => {
    let current = Array.from(input.files || []);
    const newList = [];
    
    for (const f of files) {
      if (!/^image\//i.test(f.type)) continue;
      if (f.size > MAX_SIZE) {
        UI && UI.showToast ? UI.showToast(`ไฟล์ ${f.name} ใหญ่เกิน 10MB`, 'warning') : console.warn('oversize', f.name);
        continue;
      }
      newList.push(f);
    }
    
    current = current.concat(newList);
    current = dedup(current).slice(0, MAX_FILES);
    rebuildInputFiles(current);
    render();
  };
  
  input.addEventListener('change', () => accept(Array.from(input.files || [])));
  
  if (dropArea) {
    ['dragenter','dragover'].forEach(ev => {
      dropArea.addEventListener(ev, e => {
        e.preventDefault();
        dropArea.classList.add('ring-2','ring-indigo-400');
      });
    });
    
    ['dragleave','drop'].forEach(ev => {
      dropArea.addEventListener(ev, e => {
        e.preventDefault();
        dropArea.classList.remove('ring-2','ring-indigo-400');
      });
    });
    
    dropArea.addEventListener('drop', (e) => {
      const files = Array.from(e.dataTransfer.files || []);
      accept(files);
    });
  }
  
  render();
})();
</script>

    <div class="flex flex-wrap gap-2 mt-3">

      <button class="btn-primary" data-aspect="0.8">4:5</button>
      <button class="btn-primary" data-aspect="1.7777777778">16:9</button>
      <button id="crop-apply" class="btn-primary">ใช้รูปที่ครอป</button>
      <button id="crop-cancel" class="btn-primary">ยกเลิก</button>
    </div>
  </div>

<script>
// Image Cropper Functionality
(function(){
  const input = document.getElementById('image-file-input');
  const preview = document.getElementById('deluxe-preview');
  if (!input || !preview) return;
  
  function rebuild(files) {
    const dt = new DataTransfer();
    files.forEach(f => dt.items.add(f));
    input.files = dt.files;
  }
  
  function equip() {
    Array.from(preview.children).forEach((card, i) => {
      card.classList.add('reorder-card');
      card.setAttribute('draggable','true');
      
      if (!card.querySelector('.btn-crop')) {
        const bar = card.querySelector('.absolute.inset-x-0.top-0');
        const cropBtn = document.createElement('button');
        cropBtn.type = 'button';
        cropBtn.textContent = 'ครอป';
        cropBtn.className = 'btn-crop text-white bg-indigo-500/90 hover:bg-indigo-600 text-xs px-2 py-1 rounded';
        bar.appendChild(cropBtn);
        cropBtn.addEventListener('click', () => openCrop(i));
      }
      
      card.addEventListener('dragstart', ev => {
        ev.dataTransfer.setData('text/plain', i.toString());
        ev.dataTransfer.effectAllowed = 'move';
      });
      
      card.addEventListener('dragover', ev => {
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
      });
      
      card.addEventListener('drop', ev => {
        ev.preventDefault();
        const from = parseInt(ev.dataTransfer.getData('text/plain'),10);
        const arr = Array.from(input.files);
        const [moved] = arr.splice(from,1);
        arr.splice(i,0,moved);
        rebuild(arr);
        input.dispatchEvent(new Event('change'));
      });
    });
  }
  
  const modal = document.getElementById('cropper-modal');
  const canvas = document.getElementById('crop-canvas');
  const ctx = canvas.getContext('2d');
  
  let cropState = {
    img: null,
    aspect: 1,
    fileIndex: 0,
    bmp: null,
    sel: { x: 0, y: 0, w: 0, h: 0 }
  };
  
  function openCrop(index) {
    const file = Array.from(input.files)[index];
    cropState.fileIndex = index;
    
    createImageBitmap(file, { imageOrientation: 'from-image' }).then(bmp => {
      cropState.bmp = bmp;
      canvas.width = Math.min(1024, bmp.width);
      canvas.height = Math.min(600, Math.round(canvas.width * (bmp.height/bmp.width)));
      drawCrop();
      modal.classList.add('active');
    });
  }
  
  function drawCrop() {
    const bmp = cropState.bmp;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(bmp, 0, 0, canvas.width, canvas.height);
    
    const asp = cropState.aspect || 1;
    let w = canvas.width * 0.8;
    let h = w / asp;
    
    if (h > canvas.height * 0.8) {
      h = canvas.height * 0.8;
      w = h * asp;
    }
    
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;
    cropState.sel = { x, y, w, h };
    
    ctx.fillStyle = "rgba(0,0,0,.35)";
    ctx.fillRect(0, 0, canvas.width, y);
    ctx.fillRect(0, y + h, canvas.width, canvas.height - (y + h));
    ctx.fillRect(0, y, w, y + h - y);
    ctx.fillRect(x + w, y, canvas.width - (x + w), h);
    
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }
  
  document.querySelectorAll('#cropper-box [data-aspect]').forEach(btn => {
    btn.addEventListener('click', () => {
      cropState.aspect = parseFloat(btn.dataset.aspect);
      drawCrop();
    });
  });
  
  document.getElementById('crop-cancel').addEventListener('click', () => {
    modal.classList.remove('active');
  });
  
  document.getElementById('crop-apply').addEventListener('click', async () => {
    const scale = cropState.bmp.width / canvas.width;
    const s = cropState.sel;
    const cw = Math.round(s.w * scale);
    const ch = Math.round(s.h * scale);
    
    const c = document.createElement('canvas');
    c.width = cw;
    c.height = ch;
    
    c.getContext('2d').drawImage(
      cropState.bmp,
      Math.round(s.x * scale),
      Math.round(s.y * scale),
      cw, ch,
      0, 0, cw, ch
    );
    
    const blob = await new Promise(res => c.toBlob(res, 'image/webp', 0.95));
    const file = new File([blob], 'cropped.webp', {
      type: 'image/webp',
      lastModified: Date.now()
    });
    
    const arr = Array.from(input.files);
    arr.splice(cropState.fileIndex, 1, file);
    rebuild(arr);
    input.dispatchEvent(new Event('change'));
    modal.classList.remove('active');
  });
  
  const observer = new MutationObserver(equip);
  observer.observe(preview, { childList: true, subtree: false });
  equip();
})();
</script>

    transition: transform 0.1s;

  .assistive-btn:active { transform: scale(0.9); }

  .playing-pulse { animation: pulse 1.5s infinite; color: #D667C3; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(214, 103, 195, 0.6); }
    70% { box-shadow: 0 0 0 15px rgba(214, 103, 195, 0); }
    100% { box-shadow: 0 0 0 0 rgba(214, 103, 195, 0); }
  }

  .control-center-panel {
    position: fixed; top: 50%; left: 50%; 
    transform: translate(-50%, -50%) scale(0.9);
    width: 90%; max-width: 380px;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 50px 100px rgba(0,0,0,0.4);
    padding: 20px;
    opacity: 0; pointer-events: none; z-index: 100001;
    transition: all 0.25s ease;
    display: flex; flex-direction: column; gap: 12px;
    max-height: 85vh;
    overflow: hidden;
  }
  .control-center-panel.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }

  /* 🎬 Video Container (แก้โดยการใช้ display: block ผ่าน JS โดยตรง) */
  #video-display-area {
    position: relative; 
    width: 100%; 
    background: #000;
    border-radius: 14px; 
    overflow: hidden; 
    display: none; /* เริ่มต้นซ่อนไว้ */
    min-height: 220px; 
    justify-content: center; 
    align-items: center;
    z-index: 20; /* ให้อยู่บนสุดเสมอ */
  }
  
  #video-display-area iframe { width: 100%; aspect-ratio: 16/9; border: none; }
  #video-display-area video { width: 100%; max-height: 250px; }

  /* 🎵 Music Display */
  #music-display-area { text-align: center; padding: 10px; display: block; }
  
  .music-cover {
    width: 120px; height: 120px; margin: 0 auto 10px;
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .music-cover img { width: 100%; height: 100%; object-fit: cover; }

  /* 📂 Playlist View */
  .playlist-view {
    display: none; flex-direction: column; gap: 8px;
    max-height: 300px; overflow-y: auto;
    padding-right: 5px;
  }
  .playlist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; background: #f8f9fa; border-radius: 10px;
    cursor: pointer; transition: 0.2s; border: 1px solid transparent;
  }
  .playlist-item:hover { background: #f0f0f0; }
  .playlist-info { flex: 1; overflow: hidden; }
  .playlist-title { font-size: 13px; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .playlist-type { font-size: 10px; color: #888; text-transform: uppercase; }

  /* Controls */
  .media-input {
    width: 100%; background: #f3f4f6; border: none;
    padding: 12px; border-radius: 12px; outline: none;
    font-size: 14px; text-align: center; color: #333;
  }
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  
  .preset-btn {
    padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 12px;
    font-size: 12px; font-weight: 600; color: #555; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .preset-btn:hover { background: #f9fafb; }
  .preset-btn.highlight { background: var(--primary-color); color: white; border: none; }
  .preset-btn.highlight i { color: white; }
  
  .close-btn {
    position: absolute; top: 15px; right: 15px;
    width: 30px; height: 30px; border-radius: 50%; background: #f3f4f6;
    display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10;
  }
  .back-btn {
    display: none; font-size: 12px; color: #555; cursor: pointer; margin-bottom: 5px;
  }
</style>

<!-- UI Elements -->
<div id="admin-assistive-root">
  <div class="assistive-btn" id="assistive-main-btn"><i class="fas fa-compact-disc"></i></div>
</div>

<div class="control-center-panel" id="admin-control-panel">
  <div class="close-btn" onclick="AdminOS.closePanel()"><i class="fas fa-times"></i></div>
  
  <div class="text-center">
    <h3 class="font-bold text-gray-800" id="panel-title">Media Center</h3>
    <div class="back-btn" id="playlist-back-btn" onclick="AdminOS.toggleView('player')">
      <i class="fas fa-arrow-left"></i> กลับไปหน้าเล่น
    </div>
  </div>

  <!-- PLAYER VIEW -->
  <div id="player-view-container">
    
    <!-- ⚠️ ส่วนแสดงวิดีโอ (YouTube/File) -->
    <div id="video-display-area"></div>
    
    <!-- 🎵 ส่วนแสดงหน้าปกเพลง (จะถูกซ่อนเมื่อเล่นวิดีโอ) -->
    <div id="music-display-area">
      <div class="music-cover">
        <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=400&q=80">
      </div>
      <p class="text-xs text-gray-500 mt-2" id="current-track-name">Ready to Play</p>
    </div>

    <!-- ช่องกรอก URL -->
    <input type="text" class="media-input mb-3" id="media-url-input" 
           placeholder="วางลิงก์ YouTube หรือ Video..." 
           onkeypress="if(event.key === 'Enter') AdminOS.playFromInput(this.value)">

    <div class="preset-grid">
      <!-- ปุ่มเปิดคลังเพลง -->
      <button class="preset-btn highlight" style="grid-column: span 2;" 
              onclick="AdminOS.toggleView('playlist')">
        <i class="fas fa-list-ul"></i> 📂 เปิดคลังเพลงของฉัน
      </button>

      <button class="preset-btn" onclick="AdminOS.playMedia('https://www.youtube.com/watch?v=jfKfPfyJRdk', 'youtube', 'Lofi Girl')">
        <i class="fas fa-coffee"></i> Lofi Girl
      </button>
      
      <button class="preset-btn" onclick="document.getElementById('local-file-picker').click()">
        <i class="fas fa-folder-open"></i> ไฟล์เครื่อง
      </button>
      
      <button class="preset-btn" style="color:red; grid-column: span 2;" onclick="AdminOS.stopAll()">
        <i class="fas fa-stop"></i> หยุดเล่น
      </button>
    </div>
  </div>

  <!-- PLAYLIST VIEW (หน้ารายการเพลง) -->
  <div id="playlist-view-container" class="playlist-view"></div>
  
  <input type="file" id="local-file-picker" hidden accept="video/*,audio/*" onchange="AdminOS.playLocalFile(this)">
</div>

<script>
const AdminOS = {
  // --- 💿 คลังเพลงบนโฮสต์ (ใส่ชื่อไฟล์ตรงนี้) ---
  myAlbum: [
    // แบบที่ 1: ไฟล์บนโฮสต์ (ใส่ path ให้ถูก)
    { 
      title: "เวอร์ชั่น - น้อนน", 
      url: "./songs/เวอร์ชั่น - น้อนน.mp4", 
      type: "video" 
    },

    // ถ้ามีเพลงอื่นในโฟลเดอร์ songs อีก ก็เพิ่มบรรทัดต่อได้เลย
    { 
      title: "😶", 
      url: "./songs/😶.mp4", 
      type: "video" 
    },

    // แบบที่ 2: ลิงก์ YouTube (ผสมกันได้)
    { 
      title: "นนท์ ธนนท์ - วันที่อ่อนแอ (Live)", 
      url: "https://www.youtube.com/watch?v=PrlV8Q_FvjM", 
      type: "youtube" 
    }
    
  ],
  

  root: document.getElementById('admin-assistive-root'),
  btn: document.getElementById('assistive-main-btn'),
  panel: document.getElementById('admin-control-panel'),
  
  playerView: document.getElementById('player-view-container'),
  playlistView: document.getElementById('playlist-view-container'),
  backBtn: document.getElementById('playlist-back-btn'),
  panelTitle: document.getElementById('panel-title'),
  
  videoArea: document.getElementById('video-display-area'),
  musicArea: document.getElementById('music-display-area'),
  trackName: document.getElementById('current-track-name'),
  audioPlayer: new Audio(),
  isDragging: false,

  init() {
    this.setupDraggable();
    this.renderPlaylist();
    this.btn.addEventListener('click', () => {
      if (!this.isDragging) this.panel.classList.toggle('active');
    });
  },

  closePanel() { this.panel.classList.remove('active'); },

  // สลับหน้าจอ
  toggleView(view) {
    if (view === 'playlist') {
      this.playerView.style.display = 'none';
      this.playlistView.style.display = 'flex';
      this.backBtn.style.display = 'inline-block';
      this.panelTitle.innerText = "My Album";
    } else {
      this.playerView.style.display = 'block';
      this.playlistView.style.display = 'none';
      this.backBtn.style.display = 'none';
      this.panelTitle.innerText = "Media Center";
    }
  },

  renderPlaylist() {
    this.playlistView.innerHTML = '';
    this.myAlbum.forEach((item) => {
      const el = document.createElement('div');
      el.className = 'playlist-item';
      let icon = item.type === 'video' ? 'fa-video' : 'fa-youtube';
      
      el.innerHTML = `
        <i class="fas ${icon}" style="color:${item.type==='youtube'?'red':'#555'}"></i>
        <div class="playlist-info">
          <div class="playlist-title">${item.title}</div>
          <div class="playlist-type">${item.type}</div>
        </div>
        <i class="fas fa-play-circle" style="color:var(--primary-color)"></i>
      `;
      el.onclick = () => {
        this.playMedia(item.url, item.type, item.title);
        this.toggleView('player');
      };
      this.playlistView.appendChild(el);
    });
  },

  stopAll() {
    this.videoArea.innerHTML = '';
    this.videoArea.style.display = 'none'; // ซ่อนจอวิดีโอ
    this.musicArea.style.display = 'block'; // โชว์ปกเพลงคืนมา
    this.audioPlayer.pause();
    this.btn.classList.remove('playing-pulse');
    this.trackName.innerText = "Stopped";
  },

  playFromInput(url) {
    url = url.trim();
    if (!url) return;
    let type = (url.includes('youtube') || url.includes('youtu.be')) ? 'youtube' : 'video';
    this.playMedia(url, type, 'Unknown Track');
  },

  // ✅ ฟังก์ชันเล่นสื่อ (แก้ไขให้แสดงผลแน่นอน)
  playMedia(source, type, title) {
    // 1. หยุดเสียงเพลงพื้นหลังก่อนเสมอ
    this.audioPlayer.pause();
    
    // 2. อัปเดตชื่อเพลง / เอฟเฟกต์ปุ่ม
    this.btn.classList.add('playing-pulse');
    if(title) this.trackName.innerText = title;

    // 3. จัดการการแสดงผล (สำคัญมาก!)
    if (type === 'youtube' || type === 'video') {
      this.musicArea.style.display = 'none';  // บังคับปิดปกเพลง!
      this.videoArea.style.display = 'flex';  // บังคับเปิดจอวิดีโอ!
    } else {
      this.musicArea.style.display = 'block';
      this.videoArea.style.display = 'none';
    }

    // 4. เล่นตามประเภท
    if (type === 'youtube') {
      let vId = '';
      if (source.includes('youtu.be')) vId = source.split('/').pop().split('?')[0];
      else if (source.includes('v=')) vId = source.split('v=')[1].split('&')[0];
      
      // Iframe มาตรฐาน + autoplay
      this.videoArea.innerHTML = `
        <iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&playsinline=1&rel=0&controls=1" 
        allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

    } else if (type === 'video') {
      this.videoArea.innerHTML = `
        <video src="${source}" controls autoplay playsinline webkit-playsinline 
               style="width:100%; height:100%; object-fit:contain;"></video>`;

    } else {
      // Audio Only
      this.audioPlayer.src = source;
      this.audioPlayer.play();
    }
  },

  playLocalFile(input) {
    const file = input.files[0];
    if (file) {
      const url = URL.createObjectURL(file);
      const type = file.type.startsWith('video') ? 'video' : 'audio';
      this.playMedia(url, type, file.name);
    }
  },

  setupDraggable() {
    const el = this.root;
    let startX, startY, initX, initY, moved = false;
    const start = (e) => {
      const evt = e.touches ? e.touches[0] : e;
      startX = evt.clientX; startY = evt.clientY;
      const rect = el.getBoundingClientRect();
      initX = rect.left; initY = rect.top;
      moved = false; this.isDragging = false;
      el.style.transition = 'none';
      document.addEventListener('touchmove', move, {passive:false});
      document.addEventListener('touchend', end);
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', end);
    };
    const move = (e) => {
      const evt = e.touches ? e.touches[0] : e;
      const dx = evt.clientX - startX; const dy = evt.clientY - startY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        if(e.cancelable) e.preventDefault();
        moved = true; this.isDragging = true;
        el.style.left = `${initX + dx}px`;
        el.style.top = `${initY + dy}px`;
      }
    };
    const end = () => {
      document.removeEventListener('touchmove', move);
      document.removeEventListener('touchend', end);
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', end);
      if (moved) {
        el.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        const w = window.innerWidth;
        const rect = el.getBoundingClientRect();
        if (rect.left + rect.width/2 > w/2) el.style.left = (w - 70) + 'px';
        else el.style.left = '10px';
        setTimeout(() => this.isDragging = false, 100);
      }
    };
    el.addEventListener('touchstart', start, {passive:false});
    el.addEventListener('mousedown', start);
  }
};

AdminOS.init();
</script>

</body>
</html>
